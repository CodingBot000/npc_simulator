openapi: 3.1.0
info:
  title: NPC Simulator Backend API
  version: 2026-04-15
  description: |
    Current backend-facing contract snapshot after the Spring Boot bridge cut.
    Core runtime and review DTOs are sourced from generated JSON Schema so the
    OpenAPI contract stays aligned with the TypeScript runtime models.
servers:
  - url: http://localhost:8080
paths:
  /api/world:
    get:
      operationId: getWorld
      parameters:
        - in: header
          name: x-world-instance-id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Current world snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorldSnapshot"
  /api/reset:
    post:
      operationId: resetWorld
      parameters:
        - in: header
          name: x-world-instance-id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Reset world snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorldSnapshot"
  /api/interact:
    post:
      operationId: interact
      parameters:
        - in: header
          name: x-world-instance-id
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InteractionRequest"
      responses:
        "200":
          description: Interaction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InteractionResponse"
  /api/inspector:
    get:
      operationId: getInspector
      parameters:
        - in: header
          name: x-world-instance-id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Latest inspector payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectorResponse"
  /api/review:
    get:
      operationId: getReviewDashboard
      responses:
        "200":
          description: Review dashboard payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewDashboardData"
    patch:
      operationId: patchReviewDecision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewDecisionRequest"
      responses:
        "200":
          description: Updated review item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewMutationResult"
  /api/review/finalize:
    get:
      operationId: getReviewFinalizeStatus
      responses:
        "200":
          description: Finalize job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewFinalizeStatus"
    post:
      operationId: runReviewFinalize
      responses:
        "200":
          description: Finalize job status after execution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewFinalizeStatus"
  /api/review/training:
    get:
      operationId: getReviewTrainingStatus
      responses:
        "200":
          description: Training job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewTrainingStatus"
    post:
      operationId: runReviewTraining
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewTrainingRequest"
      responses:
        "200":
          description: Training job status after launch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewTrainingStatus"
  /api/review/training/evaluate:
    post:
      operationId: runReviewTrainingEvaluation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewTrainingRunActionRequest"
      responses:
        "200":
          description: Training status after evaluation launch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewTrainingStatus"
  /api/review/training/decision:
    post:
      operationId: updateReviewTrainingDecision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewTrainingDecisionRequest"
      responses:
        "200":
          description: Training status after decision update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewTrainingStatus"
  /api/review/training/promote:
    post:
      operationId: promoteReviewTrainingRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewTrainingRunActionRequest"
      responses:
        "200":
          description: Training status after model promotion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewTrainingStatus"
  /api/review/pipeline:
    get:
      operationId: getReviewPipelineStatus
      responses:
        "200":
          description: Review pipeline status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewPipelineStatus"
  /api/review/pipeline/judge:
    post:
      operationId: runJudgeReviewQueue
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewPipelineRunRequest"
      responses:
        "200":
          description: Pipeline command result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewPipelineRunResult"
  /api/review/pipeline/prepare-human-review:
    post:
      operationId: runPrepareHumanReview
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewPipelineRunRequest"
      responses:
        "200":
          description: Pipeline command result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewPipelineRunResult"
  /api/review/pipeline/llm-first-pass:
    post:
      operationId: runReviewLlmFirstPass
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewPipelineRunRequest"
      responses:
        "200":
          description: Pipeline command result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewPipelineRunResult"
  /api/system/info:
    get:
      operationId: getSystemInfo
      responses:
        "200":
          description: Backend system info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemInfo"
components:
  schemas:
    InteractionRequest:
      $ref: "../generated/json-schema/InteractionRequest.json"
    InteractionResponse:
      $ref: "../generated/json-schema/InteractionResponse.json"
    WorldSnapshot:
      $ref: "../generated/json-schema/WorldSnapshot.json"
    InspectorResponse:
      $ref: "../generated/json-schema/InspectorResponse.json"
    ReviewDashboardData:
      $ref: "../generated/json-schema/ReviewDashboardData.json"
    ReviewMutationResult:
      $ref: "../generated/json-schema/ReviewMutationResult.json"
    ReviewFinalizeStatus:
      $ref: "../generated/json-schema/ReviewFinalizeStatus.json"
    ReviewTrainingStatus:
      $ref: "../generated/json-schema/ReviewTrainingStatus.json"
    ReviewPipelineStatus:
      $ref: "../generated/json-schema/ReviewPipelineStatus.json"
    ReviewPipelineRunResult:
      $ref: "../generated/json-schema/ReviewPipelineRunResult.json"
    ReviewTrainingRequest:
      $ref: "../generated/json-schema/ReviewTrainingRequest.json"
    ReviewTrainingRunActionRequest:
      $ref: "../generated/json-schema/ReviewTrainingRunActionRequest.json"
    ReviewTrainingDecisionRequest:
      $ref: "../generated/json-schema/ReviewTrainingDecisionRequest.json"
    ReviewPipelineRunRequest:
      $ref: "../generated/json-schema/ReviewPipelineRunRequest.json"
    SystemInfo:
      $ref: "../generated/json-schema/SystemInfo.json"
    ReviewDecisionRequest:
      $ref: "../generated/json-schema/ReviewDecisionRequest.json"
