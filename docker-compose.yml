services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      NPC_SIMULATOR_DEPLOYMENT_MODE: ${NPC_SIMULATOR_DEPLOYMENT_MODE:-cloud}
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      BACKEND_STORAGE_ROOT: ${BACKEND_STORAGE_ROOT:-/srv/npc-simulator/storage}
      NPC_SIMULATOR_ROOT: /workspace
      NPC_SIMULATOR_BRIDGE_ENABLED: ${NPC_SIMULATOR_BRIDGE_ENABLED:-true}
      NPC_SIMULATOR_CORS_ALLOWED_ORIGINS: ${NPC_SIMULATOR_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:-8}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:-2}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT_MS: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT_MS:-5000}
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT_MS: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT_MS:-30000}
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME_MS: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME_MS:-1800000}
      SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD_MS: ${SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD_MS:-30000}
      NPC_SIMULATOR_DB_POOL_MAX: ${NPC_SIMULATOR_DB_POOL_MAX:-2}
      NPC_SIMULATOR_DB_IDLE_TIMEOUT_MS: ${NPC_SIMULATOR_DB_IDLE_TIMEOUT_MS:-30000}
      NPC_SIMULATOR_DB_CONNECT_TIMEOUT_MS: ${NPC_SIMULATOR_DB_CONNECT_TIMEOUT_MS:-5000}
      LLM_PROVIDER_MODE: ${LLM_PROVIDER_MODE:-openai}
      INTERACTION_MODEL: ${INTERACTION_MODEL:-gpt-4.1-nano}
      INTERACTION_FALLBACK_MODEL: ${INTERACTION_FALLBACK_MODEL:-gpt-4.1-mini}
      INTERACTION_JUDGE_MODE: ${INTERACTION_JUDGE_MODE:-off}
      INTERACTION_JUDGE_MODEL: ${INTERACTION_JUDGE_MODEL:-gpt-4.1-nano}
      INTERACTION_JUDGE_TIMEOUT_MS: ${INTERACTION_JUDGE_TIMEOUT_MS:-4000}
      INTERACTION_JUDGE_MAX_OUTPUT_TOKENS: ${INTERACTION_JUDGE_MAX_OUTPUT_TOKENS:-96}
      INTERACTION_JUDGE_ENFORCEMENT: ${INTERACTION_JUDGE_ENFORCEMENT:-off}
      INTERACTION_JUDGE_CONFIDENCE_THRESHOLD: ${INTERACTION_JUDGE_CONFIDENCE_THRESHOLD:-0.8}
      EVAL_MODEL: ${EVAL_MODEL:-gpt-5.4}
      EVAL_FALLBACK_MODEL: ${EVAL_FALLBACK_MODEL:-gpt-4.1-nano}
      FINAL_REPLY_MODE: ${FINAL_REPLY_MODE:-off}
      FINAL_REPLY_BACKEND: ${FINAL_REPLY_BACKEND:-off}
      FINAL_REPLY_MODEL: ${FINAL_REPLY_MODEL:-}
      FINAL_REPLY_FALLBACK_MODEL: ${FINAL_REPLY_FALLBACK_MODEL:-}
      FINAL_REPLY_MAX_TOKENS: ${FINAL_REPLY_MAX_TOKENS:-160}
      FINAL_REPLY_TIMEOUT_MS: ${FINAL_REPLY_TIMEOUT_MS:-180000}
      FINAL_REPLY_PROMPT_FORMAT: ${FINAL_REPLY_PROMPT_FORMAT:-scene_state_min}
      FINAL_REPLY_REMOTE_PROVIDER: ${FINAL_REPLY_REMOTE_PROVIDER:-}
      FINAL_REPLY_REMOTE_MODEL_NAME: ${FINAL_REPLY_REMOTE_MODEL_NAME:-}
      FINAL_REPLY_RUNPOD_ENDPOINT_ID: ${FINAL_REPLY_RUNPOD_ENDPOINT_ID:-}
      FINAL_REPLY_BASETEN_MODEL_ID: ${FINAL_REPLY_BASETEN_MODEL_ID:-}
      FINAL_REPLY_BASETEN_MODEL_URL: ${FINAL_REPLY_BASETEN_MODEL_URL:-}
      FINAL_REPLY_USE_PROMOTED: ${FINAL_REPLY_USE_PROMOTED:-false}
      BASETEN_API_KEY: ${BASETEN_API_KEY:-}
      CANONICAL_MODEL_FAMILY: ${CANONICAL_MODEL_FAMILY:-llama31_8b_instruct}
      LOCAL_REPLY_ADAPTER_MODE: ${LOCAL_REPLY_ADAPTER_MODE:-off}
      LOCAL_REPLY_MODEL_FAMILY: ${LOCAL_REPLY_MODEL_FAMILY:-llama}
      LOCAL_REPLY_USE_PROMOTED: ${LOCAL_REPLY_USE_PROMOTED:-false}
      LOCAL_REPLY_MLX_MODEL: ${LOCAL_REPLY_MLX_MODEL:-}
      LOCAL_REPLY_MAX_TOKENS: ${LOCAL_REPLY_MAX_TOKENS:-160}
      LOCAL_REPLY_LLAMA_RUNTIME_PATH: ${LOCAL_REPLY_LLAMA_RUNTIME_PATH:-outputs/training/manual_llama31_local_check_20260421_025259/runtime}
      LOCAL_REPLY_LLAMA_PROMPT_FORMAT: ${LOCAL_REPLY_LLAMA_PROMPT_FORMAT:-scene_state_min}
      SHADOW_COMPARE_ENABLED: ${SHADOW_COMPARE_ENABLED:-false}
      SHADOW_COMPARE_LABEL: ${SHADOW_COMPARE_LABEL:-Local Llama Shadow}
      SHADOW_COMPARE_RUNTIME_ARTIFACT_PATH: ${SHADOW_COMPARE_RUNTIME_ARTIFACT_PATH:-outputs/training/manual_llama31_local_check_20260421_025259/runtime}
      SHADOW_COMPARE_RUNTIME_ARTIFACT_KIND: ${SHADOW_COMPARE_RUNTIME_ARTIFACT_KIND:-mlx_fused_model}
      SHADOW_COMPARE_MLX_MODEL: ${SHADOW_COMPARE_MLX_MODEL:-}
      SHADOW_COMPARE_MAX_TOKENS: ${SHADOW_COMPARE_MAX_TOKENS:-360}
      NPC_AUTONOMY_DEBUG_SEED: ${NPC_AUTONOMY_DEBUG_SEED:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4}
      LOW_COST_MODEL: ${LOW_COST_MODEL:-gpt-5.4-mini}
      PREMIUM_MODEL: ${PREMIUM_MODEL:-gpt-5.4}
      LOW_COST_FALLBACK_MODEL: ${LOW_COST_FALLBACK_MODEL:-gpt-5.4-mini}
      PREMIUM_FALLBACK_MODEL: ${PREMIUM_FALLBACK_MODEL:-gpt-5.4-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      TOGETHER_API_BASE_URL: ${TOGETHER_API_BASE_URL:-}
      RUNPOD_API_KEY: ${RUNPOD_API_KEY:-}
      RUNPOD_ENDPOINT_ID: ${RUNPOD_ENDPOINT_ID:-}
      RUNPOD_REST_API_BASE_URL: ${RUNPOD_REST_API_BASE_URL:-}
      RUNPOD_SERVERLESS_API_BASE_URL: ${RUNPOD_SERVERLESS_API_BASE_URL:-}
    volumes:
      - ./backend/storage:/srv/npc-simulator/storage
    ports:
      - "${BACKEND_HOST_PORT:-8080}:${BACKEND_PORT:-8080}"
