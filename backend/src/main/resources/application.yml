server:
  port: ${BACKEND_PORT:8080}

spring:
  application:
    name: npc-simulator-backend

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

npc-simulator:
  storage:
    root: ${BACKEND_STORAGE_ROOT:/srv/npc-simulator/storage}
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
