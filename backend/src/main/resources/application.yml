server:
  port: ${BACKEND_PORT:8080}

spring:
  application:
    name: npc-simulator-backend
  autoconfigure:
    exclude:
      - org.springframework.boot.security.autoconfigure.SecurityAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/npc_simulator}
    username: ${SPRING_DATASOURCE_USERNAME:npc_simulator}
    password: ${SPRING_DATASOURCE_PASSWORD:npc_simulator}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

npc-simulator:
  storage:
    root: ${BACKEND_STORAGE_ROOT:/srv/npc-simulator/storage}
  runtime:
    project-root: ${NPC_SIMULATOR_ROOT:}
    workdir: ${NPC_SIMULATOR_WORKDIR:}
    scripts-root: ${NPC_SIMULATOR_SCRIPTS_ROOT:}
    node-bin-dir: ${NPC_SIMULATOR_NODE_BIN_DIR:}
    data-root: ${NPC_SIMULATOR_DATA_ROOT:}
    outputs-root: ${NPC_SIMULATOR_OUTPUTS_ROOT:}
    venv-root: ${NPC_SIMULATOR_VENV_ROOT:}
  bridge:
    enabled: ${NPC_SIMULATOR_BRIDGE_ENABLED:true}
  cors:
    allowed-origins: ${NPC_SIMULATOR_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
